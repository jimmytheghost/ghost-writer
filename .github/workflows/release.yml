name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  quality-gate:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ghost-writer-editor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: src/ghost-writer-editor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

  build-release:
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-13
            artifact_name: ghost-writer-macos
            rust_target: x86_64-apple-darwin
            build_command: npm run build:tauri:mac
            bundle_glob: src/ghost-writer-editor/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: windows-latest
            artifact_name: ghost-writer-windows
            rust_target: x86_64-pc-windows-msvc
            build_command: npm run build:tauri:win
            bundle_glob: src/ghost-writer-editor/src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: src/ghost-writer-editor
    env:
      TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
      TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
      APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
      APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      TAURI_MAC_TARGET: ${{ matrix.rust_target }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: src/ghost-writer-editor/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@1.84.0
        with:
          targets: ${{ matrix.rust_target }}

      - name: Cache cargo registry/target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/ghost-writer-editor/src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Sync model snapshot
        run: npm run sync:models

      - name: Build release bundle
        run: ${{ matrix.build_command }}

      - name: Build checksums (macOS)
        if: runner.os == 'macOS'
        run: |
          shopt -s nullglob
          files=( ${{ matrix.bundle_glob }} )
          if [ ${#files[@]} -eq 0 ]; then
            echo "No release artifacts found at ${{ matrix.bundle_glob }}"
            exit 1
          fi
          checksum_file="sha256-${{ matrix.artifact_name }}.txt"
          : > "$checksum_file"
          for file in "${files[@]}"; do
            shasum -a 256 "$file" >> "$checksum_file"
          done

      - name: Build checksums (Windows)
        if: runner.os == 'Windows'
        shell: powershell
        run: |
          $files = Get-ChildItem -Path "${{ matrix.bundle_glob }}"
          if (-not $files) {
            Write-Error "No release artifacts found at ${{ matrix.bundle_glob }}"
            exit 1
          }
          $checksumFile = "sha256-${{ matrix.artifact_name }}.txt"
          if (Test-Path $checksumFile) { Remove-Item $checksumFile }
          foreach ($file in $files) {
            $hash = (Get-FileHash -Path $file.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($file.FullName)" | Out-File -FilePath $checksumFile -Append -Encoding utf8
          }

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.bundle_glob }}
            src/ghost-writer-editor/sha256-${{ matrix.artifact_name }}.txt
          if-no-files-found: error

  publish-release:
    needs: build-release
    runs-on: ubuntu-latest
    environment: production-release
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create provenance attestation
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.txt

      - name: Publish draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            dist/**/*.dmg
            dist/**/*.exe
            dist/**/*.txt
