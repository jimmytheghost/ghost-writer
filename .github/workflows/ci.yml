name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ghost-writer-editor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm
          cache-dependency-path: src/ghost-writer-editor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint and build
        run: npm run check
