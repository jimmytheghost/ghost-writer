name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  web-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ghost-writer-editor
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.12.0
          cache: npm
          cache-dependency-path: src/ghost-writer-editor/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run check

  tauri-smoke:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: src/ghost-writer-editor/src-tauri
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry and target
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src/ghost-writer-editor/src-tauri

      - name: Cargo check (Tauri smoke)
        run: cargo check --locked
