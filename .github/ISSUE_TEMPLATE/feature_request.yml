name: Feature request
description: Suggest an improvement for Ghost Writer
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem to solve
      description: What pain point are you trying to fix?
      placeholder: It is hard to...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe your preferred implementation or UX.
      placeholder: Add a setting to...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other options you evaluated.
  - type: textarea
    id: impact
    attributes:
      label: Impact
      description: Who benefits and how?
